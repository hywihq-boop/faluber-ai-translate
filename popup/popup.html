<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" fill="url(#g)"/>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c5cfc"/><stop offset="100%" stop-color="#5ce0fc"/></linearGradient></defs>
        <text x="12" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="system-ui">文</text>
      </svg>
      <span class="title">LinguaFlow</span>
    </div>
  </header>

  <section class="section">
    <div class="section-title" data-i18n="apiSettings">API 设置</div>
    <div class="form-group">
      <label data-i18n="apiKey">API Key</label>
      <div class="input-wrap">
        <input type="password" id="api-key" placeholder="sk-..." autocomplete="off">
        <button class="eye-btn" id="toggle-key" title="显示/隐藏">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label data-i18n="apiUrl">API 地址</label>
      <input type="text" id="api-url" placeholder="https://api.deepseek.com/v1">
    </div>
    <div class="form-group">
      <label data-i18n="model">模型</label>
      <input type="text" id="model" placeholder="deepseek-chat">
    </div>
    <div class="form-actions">
      <button class="btn btn-test" id="test-api" data-i18n="testConn">测试连接</button>
      <span class="test-result" id="test-result"></span>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Language</div>
    <select id="ui-lang">
      <option value="zh-CN">🇨🇳 简体中文</option><option value="zh-TW">🇹🇼 繁體中文</option>
      <option value="en">🇺🇸 English</option><option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option><option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option><option value="es">🇪🇸 Español</option>
      <option value="pt">🇧🇷 Português</option><option value="ru">🇷🇺 Русский</option>
      <option value="ar">🇸🇦 العربية</option><option value="hi">🇮🇳 हिन्दी</option>
      <option value="th">🇹🇭 ไทย</option><option value="vi">🇻🇳 Tiếng Việt</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="pl">🇵🇱 Polski</option>
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="id">🇮🇩 Indonesia</option>
      <option value="sv">🇸🇪 Svenska</option>
    </select>
  </section>

  <section class="section token-section" id="token-usage">
    📊 加载中...
  </section>

  <footer class="footer">
    <span><span data-i18n="shortcut">快捷键</span> <kbd>Alt+T</kbd></span>
    <span>v1.0.0</span>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
